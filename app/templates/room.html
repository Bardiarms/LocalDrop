<!DOCTYPE html>
<html>
<head>
    <title>Room - LocalDrop</title>
</head>
<body>
    <h1>LocalDrop Room</h1>

    <p><strong>Room name:</strong> {{ room_name }}</p>
    <p><strong>Room code:</strong> {{ room_code }}</p>

    <hr>

    <h2>Upload File</h2>

    <form action="/api/rooms/{{ room_code }}/files" method="post" enctype="multipart/form-data">
        <input type="file" name="uploaded_file" required>
        <button type="submit">Upload</button>
    </form>

    <hr>

    <h2>Files in this room</h2>

    {% if files %}
        <ul>
            {% for file_id, file in files.items() %}
                <li>
                    {{ file.original_name }}

                    <a href="/api/rooms/{{ room_code }}/files/{{ file_id }}/download">
                        Download
                    </a>

                    <form action="/api/rooms/{{ room_code }}/files/{{ file_id }}/delete" method="post" style="display: inline;">
                        <button type="submit">Delete</button>
                    </form>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No files uploaded yet.</p>
    {% endif %}

    <hr>

    <a href="/">Back to home</a>
</body>
</html>
