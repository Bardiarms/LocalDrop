<!DOCTYPE html>
<html>
<head>
    <title>Room - LocalDrop</title>
</head>
<body>
    <h1>LocalDrop Room</h1>

    <p><strong>Room name:</strong> {{ room_name }}</p>
    <p><strong>Room code:</strong> {{ room_code }}</p>

    <hr>

    <h2>Upload File</h2>

    <form id="upload-form" action="/api/rooms/{{ room_code }}/files" method="post" enctype="multipart/form-data">
        <input id="file-input" type="file" name="uploaded_file" required>
        <button type="submit">Upload</button>
    </form>

    <div>
    <progress id="upload-progress" value="0" max="100" style="width: 300px;"></progress>
    <span id="upload-progress-text">0%</span>
    </div>

    <hr>

    <h2>Files in this room</h2>

    {% if files %}
        <ul>
            {% for file in files%}
                <li>
                    {{ file.original_name }}

                    <a href="/api/rooms/{{ room_code }}/files/{{ file.id }}/download">
                        Download
                    </a>

                    <form action="/api/rooms/{{ room_code }}/files/{{ file.id }}/delete" method="post" style="display: inline;">
                        <button type="submit">Delete</button>
                    </form>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No files uploaded yet.</p>
    {% endif %}

   <hr>

    <h2>Room Management</h2>

    <form action="/rooms/{{ room_code }}/close" method="post">
        <button type="submit">Close Room</button>
    </form>

    <hr>

    <a href="/">Back to home</a>

    <script src="/static/room.js"></script>
</body>
</html>
